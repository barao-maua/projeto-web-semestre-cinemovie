{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Sistema</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&family=Special+Elite&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/stylelogin.css' %}">
</head>
<body>

    <div class="login-container">
        <form class="login-form" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <h2>ENTRAR</h2>
            
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required placeholder="Digite sua senha">
            </div>
            
            <button type="submit" class="btn-login">Acessar</button>
            
            <p class="signup-link">Novo por aqui? <a href="#">Criar conta</a></p>
            <p class="signup-link"><a href="{% url 'index' %}">Voltar para a página principal</a></p>
        </form>
    </div>

</body>
</html>
