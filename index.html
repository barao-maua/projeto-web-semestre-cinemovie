<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styly.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@400;600&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <title>CineMovie</title>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <img src="pngtree-flat-clapperboard-video-icon-black-and-white-striped-top-with-simple-png-image_17345655 6.png" alt="logo">
            <div class="header-title">
                <h1>CineMovie</h1>
                <span class="tagline">O cinema pra você!</span>
            </div>
        </div>
        <div class="header-banners">
            <img src="image 9.png" alt="filme1" class="banner-img">
            <img src="image 10.png" alt="filme2" class="banner-img">
            <img src="image 11 (1).png" alt="filme3" class="banner-img">
            <img src="image 12.png" alt="filme4" class="banner-img">
            <img src="image 13.png" alt="filme5" class="banner-img">
        </div>
    </header>

    <!-- MENU -->
    <nav>
        <div class="nav-links">
            <a href="#" class="active">Inicios</a>
            <a href="Filmes.html">Filmes</a>
            <a href="#">Séries</a>
            <a href="#">Sobre nós</a>
        </div>
        <div class="nav-right">
            <a href="#" class="entrar">Entrar</a>
            <span class="user-icon">👤</span>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside>
            <h3>Categorias:</h3>
            <ul>
                <li><a href="#">Ação</a></li>
                <li><a href="#">Terror</a></li>
                <li><a href="#">Comédia</a></li>
                <li><a href="#">Animação</a></li>
                <li><a href="#">Suspese</a></li>
            </ul>
        </aside>

        <!-- GRID DE FILMES -->
        <div class="conteudo">
            <div class="filmes-grid">

                <div class="filme-card">
                    <a href="filmes.html">
                    <img src="image 9.png" alt="Iron Lung">
                    </a>
                    <p class="filme-titulo">Iron Lung</p>
                </div>

                <div class="filme-card">
                    <img src="image 10.png" alt="Zootopia 2">
                    <p class="filme-titulo">Zootopia 2</p>
                </div>

                <div class="filme-card">
                    <img src="image 11 (1).png" alt="Pânico 7">
                    <p class="filme-titulo">Pânico 7</p>
                </div>

                <div class="filme-card">
                    <img src="image 12.png" alt="Questão de tempo">
                    <p class="filme-titulo">Questão de tempo</p>
                </div>

                <div class="filme-card">
                    <img src="image 13.png" alt="Avatar">
                    <p class="filme-titulo">Avatar</p>
                </div>

            </div>
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>Copyright © 2026 CineMovie.</p>
    </footer>

</body>
</html>
